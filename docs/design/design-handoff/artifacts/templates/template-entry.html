<!doctype html>
<!-- ============================================================================
  keel-docs-theme · template-entry
  The single page at the ROOT of guide/ (depth 0 → relative paths are _theme/… , brand/…).
  A DOOR, not a landing: logo + product name, one-line description, version, audience
  choice, language selector, footer with support links. No marketing hero.
  Spec: SPEC/screens/template-entry.md
============================================================================ -->
<html lang="{{ default_locale }}" dir="{{ dir }}" data-root="">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="keel-docs-theme" content="__THEME_VERSION__">
  <meta name="color-scheme" content="light dark">
  <title>{{ product.name }} · {{ str.documentation }}</title>
  <link rel="stylesheet" href="_theme/css/theme.css">
  <link rel="stylesheet" href="_theme/css/print.css" media="print">
  <link rel="stylesheet" href="brand/brand.css">
  <script src="strings-{{ default_locale }}.js"></script>
</head>
<body>
  <div class="entry">
    <main class="entry__main" id="main">
      <div class="entry__brand">
        <span class="entry__logo"><img src="brand/logo.svg" alt="{{ product.name }}" height="56"></span>
        <span class="entry__name">{{ product.name }}</span>
      </div>
      <p class="entry__desc">{{ product.description }}</p>
      <p class="entry__version">{{ product.version }}</p>

      <!-- Language selector: one button per available locale. JS toggles the panels
           below (data-lang-panel). Current locale = aria-selected="true". -->
      <div class="switcher switcher--lang" role="group" aria-label="{{ str.language }}" style="margin-block-start:var(--sp-6)">
        <button class="switcher__item entry-lang__btn" type="button" data-lang="{{ locale }}" aria-selected="true">{{ locale|upper }}</button>
      </div>

      <!-- repeat: one panel per locale; only the active one is visible -->
      <div data-lang-panel="{{ locale }}">
        <div class="entry__choices">
          <a class="audience-card" href="{{ locale }}/user/index.html">
            <!-- icon: audience-user (class audience-card__icon) -->
            <span class="audience-card__title" data-i18n="audience_user"></span>
            <span class="audience-card__desc">{{ str.user_blurb }}</span>
            <span class="audience-card__go">{{ str.enter }} <!-- icon: arrow-next --></span>
          </a>
          <a class="audience-card" href="{{ locale }}/dev/index.html">
            <!-- icon: audience-dev (class audience-card__icon) -->
            <span class="audience-card__title" data-i18n="audience_dev"></span>
            <span class="audience-card__desc">{{ str.dev_blurb }}</span>
            <span class="audience-card__go">{{ str.enter }} <!-- icon: arrow-next --></span>
          </a>
        </div>
      </div>
    </main>

    <footer class="site-footer" style="justify-content:center">
      <nav><a href="{{ support.url }}">{{ support.label }}<!-- icon: external --></a></nav>
      <span class="site-footer__meta" data-i18n="footer_generated"></span>
    </footer>
  </div>
  <script src="_theme/js/theme.js"></script>
</body>
</html>
