<!doctype html>
<!-- ============================================================================
  keel-docs-theme · template-audience-home
  Built ONCE. ONE template, TWO data variants (user | dev) — never two templates.
  user  → task groups + featured entries (install, getting started, troubleshooting)
  dev   → portal sections (Architecture, API, Usage, Reference, Security, Changelog)
  Spec: SPEC/screens/template-audience-home.md   Depth 2 → ../../ relative paths.
============================================================================ -->
<html lang="{{ locale }}" dir="{{ dir }}" data-audience="{{ audience }}" data-root="../../">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="keel-docs-theme" content="__THEME_VERSION__">
  <meta name="color-scheme" content="light dark">
  <title>{{ audience.title }} · {{ product.name }}</title>
  <link rel="stylesheet" href="../../_theme/css/theme.css">
  <link rel="stylesheet" href="../../_theme/css/print.css" media="print">
  <link rel="stylesheet" href="../../brand/brand.css">
  <script src="../../strings-{{ locale }}.js"></script>
  <script src="../../search-index.js"></script>
</head>
<body>
  <a class="skip-link" href="#main" data-i18n="skip_to_content">Saltar al contenido</a>

  <!-- Header is IDENTICAL to template-topic (brand, search, audience + lang switchers). -->
  <header class="site-header"><!-- … same as template-topic … --></header>

  <div class="layout layout--no-toc">
    <aside class="sidebar" id="sidebar">
      <p class="sidebar__title">{{ audience.title }}</p>
      <ul class="nav-tree"><!-- same nav tree as template-topic, home link active --></ul>
    </aside>

    <main class="home" id="main">
      <div class="home__inner">
        <h1 class="home__title">{{ audience.title }}</h1>
        <p class="home__lead">{{ audience.lead }}</p>

        <!-- repeat: one section-group per data group -->
        <section class="section-group">
          <h2 class="section-group__title">{{ group.label }}</h2>
          <div class="topic-grid">
            <!-- repeat: one card per topic in the group -->
            <a class="topic-card" href="{{ topic.href }}">
              <span class="topic-card__title">{{ topic.title }}</span>
              <span class="topic-card__desc">{{ topic.desc }}</span>
            </a>
          </div>
        </section>
      </div>
    </main>
  </div>

  <footer class="site-footer"><!-- … same as template-topic … --></footer>
  <script src="../../_theme/js/theme.js"></script>
</body>
</html>
